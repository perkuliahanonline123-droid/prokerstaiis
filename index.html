<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Pekerjaan Rutin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .loader { border-top-color: #3498db; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased p-6">

  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-900">Dashboard Pekerjaan Rutin</h1>
      <span class="bg-blue-100 text-blue-800 text-sm font-medium px-3 py-1 rounded-full">Siklus 2026</span>
    </div>

    <div id="loading" class="flex flex-col justify-center items-center py-20">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
      <p class="text-gray-500 font-medium">Mengambil data dari Google Sheets...</p>
    </div>

    <div id="tableContainer" class="bg-white shadow-md rounded-lg overflow-hidden hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-800 text-white">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">No</th>
              <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Divisi</th>
              <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Kegiatan</th>
              <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Siklus</th>
              <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">Batas Waktu</th>
              <th class="px-6 py-3 text-center text-xs font-medium uppercase tracking-wider">Aksi (Alarm)</th>
            </tr>
          </thead>
          <tbody id="dataBody" class="bg-white divide-y divide-gray-200">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // URL Google Apps Script Anda (Berperan sebagai API backend)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWOm3O52G3RWX1HPDXFEXVxYwfXQyf2EsNESVNkXn1jSnqk1GlgM5uSx0gXV_SaQwp/exec';

    document.addEventListener("DOMContentLoaded", loadData);

    async function loadData() {
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        renderData(data);
      } catch (error) {
        Swal.fire('Error!', 'Gagal mengambil data dari server.', 'error');
        console.error("Error fetching data:", error);
      }
    }

    function renderData(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('tableContainer').classList.remove('hidden');
      
      const tbody = document.getElementById('dataBody');
      let html = '';

      data.forEach(item => {
        let badgeColor = item.batasWaktu !== 'Tidak ditentukan' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800';

        html += `
          <tr class="hover:bg-gray-50 transition duration-150">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.no}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-900">${item.divisi}</td>
            <td class="px-6 py-4 text-sm text-gray-700 min-w-[300px]">${item.kegiatan}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.siklus}</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${badgeColor}">
                ${item.batasWaktu}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium">
              <button onclick="promptAlarm('${item.kegiatan.replace(/'/g, "\\'")}', '${item.divisi}', '${item.batasWaktu}')" 
                      class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded shadow-sm transition-colors">
                🔔 Ingatkan
              </button>
            </td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    async function promptAlarm(kegiatan, divisi, batasWaktu) {
      // Meminta email karena Vercel tidak membaca akun Google otomatis
      const { value: email } = await Swal.fire({
        title: 'Kirim Pengingat',
        input: 'email',
        inputLabel: 'Masukkan alamat email penerima alarm',
        inputPlaceholder: 'email@domain.com',
        showCancelButton: true,
        confirmButtonText: 'Kirim Alarm',
        cancelButtonText: 'Batal',
        confirmButtonColor: '#4f46e5'
      });

      if (email) {
        sendAlarmRequest(kegiatan, divisi, batasWaktu, email);
      }
    }

    async function sendAlarmRequest(kegiatan, divisi, batasWaktu, email) {
      Swal.fire({
        title: 'Mengirim Alarm...',
        text: 'Menghubungi server Google...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });

      // Membuat URL parameter untuk mengirim request ke GAS
      const params = new URLSearchParams({
        action: 'alarm',
        email: email,
        kegiatan: kegiatan,
        divisi: divisi,
        batasWaktu: batasWaktu
      });

      try {
        const response = await fetch(`${SCRIPT_URL}?${params.toString()}`);
        const result = await response.json();

        if(result.status === 'success') {
          Swal.fire('Berhasil!', 'Alarm telah dikirim ke email tersebut.', 'success');
        } else {
          Swal.fire('Gagal!', result.message, 'error');
        }
      } catch (error) {
        Swal.fire('Error!', 'Terjadi kesalahan jaringan.', 'error');
      }
    }
  </script>
</body>
</html>
