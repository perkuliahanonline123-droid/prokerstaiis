<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Alur Kerja Rutin Divisi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .animate-pulse-slow { animation: pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body class="bg-[#f9fafb] text-gray-900 min-h-screen">

  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center space-x-3">
          <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-sm">🔄</span>
          </div>
          <span class="text-xl font-bold tracking-tight text-gray-900">WorkPlan Pro</span>
        </div>
        <div class="flex items-center space-x-4">
          <span class="flex items-center text-xs font-medium bg-gray-100 text-gray-800 px-3 py-1.5 rounded-full border border-gray-200">
            <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span>
            Live Database Connected
          </span>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div class="mb-8">
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Monitoring Pekerjaan Rutin</h1>
      <p class="text-sm text-gray-500 mt-1">Data otomatis diurutkan kronologis berdasarkan batas waktu terdekat.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between">
        <div>
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Alarm Kritis (Bulan Ini)</p>
          <h3 id="stat-critical" class="text-3xl font-bold text-red-600 mt-1">0</h3>
        </div>
        <div class="w-12 h-12 bg-red-50 text-red-500 rounded-lg flex items-center justify-center text-xl">🔴</div>
      </div>
      <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between">
        <div>
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Peringatan (Bulan Depan)</p>
          <h3 id="stat-warning" class="text-3xl font-bold text-amber-500 mt-1">0</h3>
        </div>
        <div class="w-12 h-12 bg-amber-50 text-amber-500 rounded-lg flex items-center justify-center text-xl">🟡</div>
      </div>
      <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between">
        <div>
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Terjadwal</p>
          <h3 id="stat-total" class="text-3xl font-bold text-gray-900 mt-1">0</h3>
        </div>
        <div class="w-12 h-12 bg-gray-50 text-gray-500 rounded-lg flex items-center justify-center text-xl">📋</div>
      </div>
    </div>

    <div id="loading" class="space-y-4">
      <div class="h-12 bg-gray-200 rounded-lg animate-pulse"></div>
      <div class="h-20 bg-gray-200 rounded-lg animate-pulse"></div>
      <div class="h-20 bg-gray-200 rounded-lg animate-pulse"></div>
    </div>

    <div id="tableContainer" class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-left">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th scope="col" class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider w-16">No</th>
              <th scope="col" class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Divisi</th>
              <th scope="col" class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Kegiatan & Aspek</th>
              <th scope="col" class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider w-32">Siklus</th>
              <th scope="col" class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider w-48">Batas Waktu</th>
              <th scope="col" class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider w-40 text-center">Status Alarm</th>
            </tr>
          </thead>
          <tbody id="dataBody" class="divide-y divide-gray-200 bg-white">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWOm3O52G3RWX1HPDXFEXVxYwfXQyf2EsNESVNkXn1jSnqk1GlgM5uSx0gXV_SaQwp/exec';

    const monthOrder = ["januari", "februari", "maret", "april", "mei", "juni", "juli", "agustus", "september", "oktober", "november", "desember"];

    document.addEventListener("DOMContentLoaded", loadData);

    async function loadData() {
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        if (data.error) {
          alert("Error Server: " + data.message);
          return;
        }

        processAndRender(data);
      } catch (error) {
        console.error("Fetch error:", error);
        alert("Gagal memuat data. Periksa CORS atau Deployment Apps Script Anda.");
      }
    }

    // Fungsi Pembantu Pencari Urutan Waktu Berdasarkan Bulan Terdekat
    function getMonthWeight(text) {
      if (!text || text === 'Tidak ditentukan') return 999;
      const lower = text.toLowerCase();
      
      // Jika berisi rentang waktu, ambil bulan pertama yang disebut
      for (let i = 0; i < monthOrder.length; i++) {
        if (lower.includes(monthOrder[i])) {
          return i; // Mengembalikan index 0-11
        }
      }
      return 500; // Jika berkala rutin seperti 'Semesteran/Tahunan' tanpa nama bulan konkret
    }

    function processAndRender(data) {
      // 1. URUTKAN BERDASARKAN WAKTU KRONOLOGIS
      data.sort((a, b) => getMonthWeight(a.batasWaktu) - getMonthWeight(b.batasWaktu));

      let criticalCount = 0;
      let warningCount = 0;
      
      const tbody = document.getElementById('dataBody');
      let html = '';

      data.forEach((item, index) => {
        const timeText = item.batasWaktu.toLowerCase();
        
        // 2. LOGIKA ALARM OTOMATIS BERDASARKAN WARNA (Current context: Juli 2026)
        let alarmBadge = '';
        let rowHighlight = 'bg-white';

        if (timeText.includes('juli')) {
          // Alarm Kritis - Bulan Ini
          criticalCount++;
          rowHighlight = 'bg-red-50/40 hover:bg-red-50/80';
          alarmBadge = `
            <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-semibold bg-red-100 text-red-800 animate-pulse-slow border border-red-200">
              <span class="w-1.5 h-1.5 bg-red-600 rounded-full mr-1.5"></span>
              Kritis (Bulan Ini)
            </span>
          `;
        } else if (timeText.includes('agustus')) {
          // Peringatan - Bulan Depan
          warningCount++;
          rowHighlight = 'bg-amber-50/30 hover:bg-amber-50/60';
          alarmBadge = `
            <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-semibold bg-amber-100 text-amber-800 border border-amber-200">
              <span class="w-1.5 h-1.5 bg-amber-500 rounded-full mr-1.5"></span>
              Mendekati Batas
            </span>
          `;
        } else {
          // Kondisi Terjadwal Aman
          alarmBadge = `
            <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium bg-gray-100 text-gray-600 border border-gray-200">
              <span class="w-1.5 h-1.5 bg-gray-400 rounded-full mr-1.5"></span>
              Terjadwal
            </span>
          `;
        }

        html += `
          <tr class="${rowHighlight} transition-colors duration-150">
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-400">${index + 1}</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="text-sm font-bold text-gray-900 bg-gray-100 px-2.5 py-1 rounded-md">${item.divisi}</span>
            </td>
            <td class="px-6 py-4">
              <div class="text-sm font-semibold text-gray-900 max-w-xl break-words">${item.kegiatan}</div>
              ${item.aspek && item.aspek !== "" ? `<div class="text-xs text-gray-500 mt-1 bg-gray-50 p-2 rounded border border-gray-100 max-w-xl whitespace-pre-line">${item.aspek}</div>` : ''}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
              <span class="px-2 py-0.5 border border-gray-200 rounded text-xs bg-white">${item.siklus}</span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-700">
              ${item.batasWaktu}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-center">
              ${alarmBadge}
            </td>
          </tr>
        `;
      });

      // Update Panel Statistik Atas
      document.getElementById('stat-critical').innerText = criticalCount;
      document.getElementById('stat-warning').innerText = warningCount;
      document.getElementById('stat-total').innerText = data.length;

      // Hilangkan Skeleton Loading & Tampilkan Tabel Utama
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('tableContainer').classList.remove('hidden');
      
      tbody.innerHTML = html;
    }
  </script>
</body>
</html>
